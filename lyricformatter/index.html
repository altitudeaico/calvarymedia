<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Lyric Formatter — Calvary Hephzibah</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --red: #C41E2A;
            --red-light: #fef2f2;
            --red-mid: rgba(196,30,42,0.12);
            --bg: #F5F4F0;
            --surface: #FFFFFF;
            --surface-2: #FAFAF8;
            --border: rgba(0,0,0,0.07);
            --border-strong: rgba(0,0,0,0.12);
            --text: #111110;
            --text-2: #555552;
            --text-3: #999994;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.10), 0 4px 12px rgba(0,0,0,0.06);
            --radius: 16px;
            --radius-sm: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle at 20% 10%, rgba(196,30,42,0.04) 0%, transparent 50%),
                              radial-gradient(circle at 80% 90%, rgba(196,30,42,0.03) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(245,244,240,0.88);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .header img { height: 32px; width: auto; }
        .header-divider { width: 1px; height: 20px; background: var(--border-strong); }
        .header-title { font-size: 0.95rem; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
        .header-badge {
            margin-left: auto;
            background: var(--red-mid);
            color: var(--red);
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 100px;
        }
        .main {
            position: relative;
            z-index: 1;
            max-width: 1160px;
            margin: 0 auto;
            padding: 40px 32px 80px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: start;
        }
        @media (max-width: 820px) {
            .main { grid-template-columns: 1fr; padding: 24px 20px 60px; }
            .header { padding: 0 20px; }
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            animation: fadeUp 0.4s ease both;
        }
        .card:nth-child(2) { animation-delay: 0.08s; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .step-pill {
            background: var(--red);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            padding: 3px 9px;
            border-radius: 100px;
        }
        .card-header h2 { font-size: 0.95rem; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
        .slide-counter {
            margin-left: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-3);
            background: var(--surface-2);
            padding: 3px 10px;
            border-radius: 100px;
            border: 1px solid var(--border);
        }
        .card-body { padding: 24px; display: flex; flex-direction: column; gap: 18px; }
        .field { display: flex; flex-direction: column; gap: 7px; }
        .field label { font-size: 0.78rem; font-weight: 600; color: var(--text-2); letter-spacing: 0.02em; }
        .field input, .field textarea {
            width: 100%;
            background: var(--surface-2);
            border: 1.5px solid var(--border-strong);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            padding: 12px 14px;
            outline: none;
            transition: border-color 0.18s, box-shadow 0.18s;
            box-shadow: var(--shadow-sm);
        }
        .field input:focus, .field textarea:focus {
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(196,30,42,0.1), var(--shadow-sm);
        }
        .field input::placeholder, .field textarea::placeholder { color: var(--text-3); }
        .field textarea {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            line-height: 1.9;
            min-height: 240px;
            resize: vertical;
        }
        .hint {
            display: flex;
            gap: 10px;
            background: var(--surface-2);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            font-size: 0.82rem;
            color: var(--text-2);
            line-height: 1.55;
        }
        .hint-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
        .hint strong { color: var(--text); font-weight: 600; }
        .btn-generate {
            width: 100%;
            background: var(--red);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            padding: 14px 20px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: -0.01em;
            box-shadow: 0 2px 8px rgba(196,30,42,0.3), 0 1px 3px rgba(196,30,42,0.2);
            transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-generate:hover { background: #a8161f; box-shadow: 0 4px 16px rgba(196,30,42,0.35), 0 2px 6px rgba(196,30,42,0.2); }
        .btn-generate:active { transform: scale(0.985); }
        .preview-card { position: sticky; top: 84px; }
        .preview-scroll {
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 500px;
            overflow-y: auto;
        }
        .preview-scroll::-webkit-scrollbar { width: 4px; }
        .preview-scroll::-webkit-scrollbar-track { background: transparent; }
        .preview-scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
        .empty-state { text-align: center; padding: 48px 20px; color: var(--text-3); }
        .empty-icon {
            width: 52px; height: 52px;
            background: var(--surface-2);
            border: 1px solid var(--border-strong);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
            margin: 0 auto 14px;
            box-shadow: var(--shadow-sm);
        }
        .empty-state p { font-size: 0.88rem; line-height: 1.6; }

<body>

<header class="header">
    <img src="https://images.leadconnectorhq.com/image/f_webp/q_80/r_1200/u_https://assets.cdn.filesafe.space/ufTeOHywYxLPaG9TDWPG/media/68319627522e13a702426868.png" alt="Calvary Hephzibah">
    <div class="header-divider"></div>
    <div class="header-title">Song Lyric Formatter</div>
    <span class="header-badge">Media Team</span>
</header>

<main class="main">

    <div class="card">
        <div class="card-header">
            <span class="step-pill">Step 1</span>
            <h2>Enter Lyrics</h2>
        </div>
        <div class="card-body">
            <div class="field">
                <label>Song Title</label>
                <input type="text" id="songTitle" placeholder="e.g. Days of Elijah" autocomplete="off">
            </div>
            <div class="field">
                <label>Lyrics</label>
                <textarea id="lyricsInput" placeholder="He's my rock, He's my fortress
He's my deliverer, in Him will I trust

Praise the Lord, praise the Lord
Let the earth hear His voice"></textarea>
            </div>
            <div class="hint">
                <span class="hint-icon">💡</span>
                <div><strong>Two lines per slide.</strong> Aim for ~25–30 characters per line. Leave a <strong>blank line</strong> between each pair to start a new slide.</div>
            </div>
            <button class="btn-generate" onclick="generateSlides()">
                <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 1L9.2 5.8H14.3L10.1 8.7L11.8 13.5L7.5 10.5L3.2 13.5L4.9 8.7L0.7 5.8H5.8L7.5 1Z" fill="white"/></svg>
                Generate Slides
            </button>
        </div>
    </div>

    <div class="card preview-card">
        <div class="card-header">
            <span class="step-pill">Step 2</span>
            <h2>Preview &amp; Download</h2>
            <span class="slide-counter" id="slideCount" style="display:none"></span>
        </div>
        <div class="preview-scroll" id="previewArea">
            <div class="empty-state">
                <div class="empty-icon">🎵</div>
                <p>Enter your lyrics and hit<br><strong>Generate Slides</strong> to preview</p>
            </div>
        </div>
        <div class="card-footer" id="downloadFooter">
            <button class="btn-download" id="downloadBtn" onclick="downloadZip()">
                <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 1v9M4 7l3.5 3.5L11 7M2 13h11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Download ZIP
            </button>
        </div>
    </div>

</main>

<canvas id="slideCanvas" width="1920" height="1080"></canvas>

<script>
    let generatedSlides = [];

    function parseSlides(title, lyrics) {
        const slides = [{ type: 'title', lines: [title] }];
        lyrics.trim().split(/\n\s*\n/).forEach(block => {
            const lines = block.trim().split('\n').map(l => l.trim()).filter(l => l);
            if (lines.length) slides.push({ type: 'lyric', lines });
        });
        return slides;
    }

    function generateSlides() {
        const title = document.getElementById('songTitle').value.trim();
        const lyrics = document.getElementById('lyricsInput').value.trim();
        if (!title && !lyrics) return;

        generatedSlides = parseSlides(title || 'Untitled', lyrics);

        const previewArea = document.getElementById('previewArea');
        const slideCount = document.getElementById('slideCount');
        const downloadFooter = document.getElementById('downloadFooter');

        slideCount.textContent = generatedSlides.length + ' slides';
        slideCount.style.display = 'inline-flex';
        downloadFooter.classList.add('visible');
        previewArea.innerHTML = '';

        generatedSlides.forEach((slide, i) => {
            const div = document.createElement('div');
            div.className = 'slide-thumb' + (slide.type === 'title' ? ' is-title' : '');
            div.innerHTML = `
                <div class="thumb-num">${String(i+1).padStart(2,'0')}</div>
                ${slide.type === 'title' ? '<div class="thumb-tag">Title</div>' : ''}
                <div class="slide-lines">${slide.lines.map(l => `<span>${l}</span>`).join('')}</div>
                <div class="thumb-accent"></div>`;
            div.style.cssText = `opacity:0;transform:translateY(8px);transition:opacity 0.25s ease ${i*0.04}s,transform 0.25s ease ${i*0.04}s`;
            previewArea.appendChild(div);
            requestAnimationFrame(() => requestAnimationFrame(() => {
                div.style.opacity = '1';
                div.style.transform = 'translateY(0)';
            }));
        });

    let templateImg = null;
    function loadTemplate() {
        return new Promise((resolve) => {
            if (templateImg) { resolve(templateImg); return; }
            const img = new Image();
            img.onload = () => { templateImg = img; resolve(img); };
            img.src = TEMPLATE_B64;
        });
    }

    async function renderSlideToCanvas(slide, canvas) {
        const ctx = canvas.getContext('2d');
        const W = 1920, H = 1080;
        ctx.clearRect(0, 0, W, H);

        // Draw template background
        const bg = await loadTemplate();
        ctx.drawImage(bg, 0, 0, W, H);

        // Lyric text — bold white with thick black stroke, centred over clouds
        const isTitle = slide.type === 'title';
        const fontSize = isTitle ? 72 : 92;
        ctx.font = `900 ${fontSize}px 'Arial Black', 'Impact', Arial, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // Text area: between red line (~y155) and bottom (~y950)
        const textAreaTop = 180;
        const textAreaBottom = 920;
        const textAreaCentre = (textAreaTop + textAreaBottom) / 2;

        const lh = fontSize * 1.4;
        const totalH = slide.lines.length * lh;
        const startY = textAreaCentre - totalH / 2 + lh / 2;

        slide.lines.forEach((line, i) => {
            const y = startY + i * lh;
            // Thick black stroke
            ctx.strokeStyle = 'rgba(0,0,0,0.95)';
            ctx.lineWidth = isTitle ? 10 : 14;
            ctx.lineJoin = 'round';
            ctx.strokeText(line, W / 2, y);
            // White fill on top
            ctx.fillStyle = '#FFFFFF';
            ctx.fillText(line, W / 2, y);
        });

        return new Promise(r => canvas.toBlob(r, 'image/png'));
    }

    async function downloadZip() {
        if (!generatedSlides.length) return;
        const btn = document.getElementById('downloadBtn');
        btn.disabled = true;
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="animation:spin 0.8s linear infinite"><path d="M7 1A6 6 0 1 1 1 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> Generating...';

        const zip = new JSZip();
        const canvas = document.getElementById('slideCanvas');
        const title = document.getElementById('songTitle').value.trim() || 'slides';
        const folder = zip.folder(title.replace(/[^a-z0-9]/gi, '_'));

        for (let i = 0; i < generatedSlides.length; i++) {
            const blob = await renderSlideToCanvas(generatedSlides[i], canvas);
            folder.file(`slide_${String(i+1).padStart(2,'0')}.png`, blob);
        }

        const zipBlob = await zip.generateAsync({ type: 'blob' });
        const a = Object.assign(document.createElement('a'), {
            href: URL.createObjectURL(zipBlob),
            download: title.replace(/[^a-z0-9]/gi, '_') + '_slides.zip'
        });
        a.click();
        URL.revokeObjectURL(a.href);
        btn.disabled = false;
        btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 1v9M4 7l3.5 3.5L11 7M2 13h11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Download ZIP';
    }

    document.getElementById('songTitle').addEventListener('keydown', e => { if (e.key === 'Enter') generateSlides(); });
</script>
