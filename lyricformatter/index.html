<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Lyric Formatter - Calvary Hephzibah F.G. Church</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800;900&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Source Sans 3', sans-serif;
            background: #1a1a1f;
            color: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .logo img {
            height: 70px;
            margin-bottom: 10px;
        }
        
        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        
        .subtitle {
            color: #c65532;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 25px;
        }
        
        @media (max-width: 1000px) {
            .main-content { grid-template-columns: 1fr; }
        }
        
        .panel {
            background: #222228;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        
        .panel h2 {
            font-size: 1.1rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .panel h2 span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            background: #c65532;
            color: white;
            border-radius: 50%;
            font-size: 0.8rem;
        }
        
        label {
            display: block;
            color: #999;
            font-size: 0.8rem;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            background: #2a2a32;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: #f5f5f5;
            font-size: 1rem;
            font-family: inherit;
            margin-bottom: 15px;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #c65532;
        }
        
        textarea {
            min-height: 200px;
            resize: vertical;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        
        .btn-primary {
            background: #c65532;
            color: white;
            width: 100%;
        }
        
        .btn-primary:hover {
            background: #a84428;
        }
        
        .format-tip {
            background: rgba(198,85,50,0.1);
            border: 1px solid rgba(198,85,50,0.2);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            color: #ccc;
        }
        
        .format-tip strong {
            color: #c65532;
        }

            background-size: cover;
            background-position: center;
            border-radius: 10px;
            padding: 15px;
            min-height: 400px;
            position: relative;
        }
        
        .preview-area::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            pointer-events: none;
        }
        
        .slides-grid {
            display: grid;
            gap: 12px;
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
            z-index: 1;
        }
        
        .slide-card {
            background: transparent;
            border-radius: 6px;
            overflow: hidden;
            border: none;
            max-height: 180px; /* Crop the bottom portion */
        }
        
        .slide-card canvas {
            width: 100%;
            height: auto;
            display: block;
            transform: translateY(20%); /* Push graphic down so top shows and bottom crops */
        }
        
        .slide-card .label {
            padding: 6px 10px;
            font-size: 0.7rem;
            color: #ccc;
            background: transparent;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
            z-index: 1;
        }
        
        .empty-state .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
            position: relative;
            z-index: 1;
        }
        
        .actions .btn-drive {
            grid-column: span 2;
        }
        
        .btn-secondary {
            background: #2a2a32;
            color: #f5f5f5;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .btn-drive {
            background: #4285f4;
            color: white;
        }
        
        .btn-drive:hover {
            background: #3367d6;
        }
        
        .btn-drive:disabled {
            background: #666;
            cursor: not-allowed;
        }
        
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #c65532;
            color: white;
            padding: 12px;
            text-align: center;
            transform: translateY(100%);
            transition: transform 0.3s;
            z-index: 100;
        }
        
        .status-bar.visible {
            transform: translateY(0);
        }
        
        .status-bar.error { background: #d32f2f; }
        .status-bar.success { background: #388e3c; }
        
        /* Search Section Styles */
        .search-section {
            margin-bottom: 20px;
        }
        
        .search-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .search-row input {
            flex: 1;
            margin-bottom: 0;
        }
        
        .btn-search {
            background: #4285f4;
            color: white;
            white-space: nowrap;
            padding: 12px 20px;
        }
        
        .btn-search:hover {
            background: #3367d6;
        }
        
        .search-results {
            max-height: 350px;
            overflow-y: auto;
            background: #1a1a1f;
            border-radius: 8px;
        }
        
        .search-results:empty {
            display: none;
        }
        
        .search-result-item {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .search-result-item:hover {
            background: rgba(198,85,50,0.2);
        }
        
        .search-result-item:last-child {
            border-bottom: none;
        }
        
        .search-result-item .title {
            font-weight: 600;
            color: #f5f5f5;
            margin-bottom: 4px;
        }
        
        .search-result-item .source {
            font-size: 0.8rem;
            color: #888;
        }
        
        .search-result-item .link-icon {
            float: right;
            color: #4285f4;
        }
        
        .search-result-item.selected {
            background: rgba(198,85,50,0.3);
            border-left: 3px solid #c65532;
        }
        
        .lyrics-preview {
            background: #2a2a32;
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: inherit;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #ddd;
        }
        
        .lyrics-preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .lyrics-preview-header .song-info {
            font-weight: 600;
            color: #c65532;
        }
        
        .btn-use-lyrics {
            background: #388e3c;
            color: white;
            padding: 8px 16px;
            font-size: 0.85rem;
        }
        
        .btn-use-lyrics:hover {
            background: #2e7d32;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .source-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .source-tab {
            padding: 6px 12px;
            background: #2a2a32;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 0.8rem;
            color: #999;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .source-tab:hover {
            background: #3a3a42;
            color: #fff;
        }
        
        .source-tab.active {
            background: #c65532;
            border-color: #c65532;
            color: white;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #666;
            font-size: 0.85rem;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        
        .divider span {
            padding: 0 15px;
        }
        
        .searching {
            text-align: center;
            padding: 20px;
            color: #888;
        }
        
        .no-results {
            text-align: center;
            padding: 20px;
            color: #888;
        }
    </style>

        function generateSlides() {
            const title = songTitleInput.value.trim() || 'Untitled Song';
            const lyrics = lyricsText.value.trim();
            
            if (!lyrics) {
                showStatus('Please enter lyrics first', 'error');
                return;
            }
            
            if (!templateImg) {
                showStatus('Template not loaded yet, please wait...', 'error');
                return;
            }
            
            songTitle = title;
            
            // Split by blank lines
            const parts = lyrics.split(/\n\s*\n/).filter(p => p.trim());
            
            if (parts.length === 0) {
                showStatus('No content found', 'error');
                return;
            }
            
            slidesData = parts.map(text => text.trim());
            
            renderSlides();
            actions.style.display = 'flex';
            showStatus('Generated ' + slidesData.length + ' slides', 'success');
        }
        
        function renderSlides() {
            slidesGrid.innerHTML = '';
            
            slidesData.forEach((text, i) => {
                const canvas = makeSlide(text);
                addSlideCard(canvas, 'Slide ' + (i + 1));
            });
        }
        
        function addSlideCard(canvas, labelText) {
            const card = document.createElement('div');
            card.className = 'slide-card';
            card.appendChild(canvas);
            
            const label = document.createElement('div');
            label.className = 'label';
            label.textContent = labelText;
            card.appendChild(label);
            
            slidesGrid.appendChild(card);
        }
        
        function makeSlide(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 1500;
            canvas.height = 500;
            const ctx = canvas.getContext('2d');
            
            // Draw template background
            if (templateImg) {
                ctx.drawImage(templateImg, 0, 0, 1500, 500);
            } else {
                // Fallback white background
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, 1500, 500);
            }
            
            // Set up text styling - Poppins Black with white stroke
            ctx.font = '900 72px "Poppins", Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            const lines = text.split('\n');
            const lineHeight = 90;
            // Position text just below the CALVARY header/red line
            // Header ends around y=140, so start text around y=180
            const topMargin = 180;
            const startY = topMargin;
            
            lines.forEach((line, i) => {
                const x = 750;
                const y = startY + i * lineHeight;
                
                // Draw white stroke first
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 8;
                ctx.lineJoin = 'round';
                ctx.strokeText(line.trim(), x, y);
                
                // Draw black fill on top
                ctx.fillStyle = '#000000';
                ctx.fillText(line.trim(), x, y);
            });
            
            return canvas;
        }
        
        async function downloadSlides() {
            if (slidesData.length === 0) return;
            
            statusBar.textContent = 'Creating ZIP...';
            statusBar.className = 'status-bar visible';
            
            const zip = new JSZip();
            const folderName = songTitle.replace(/[^a-z0-9]/gi, '_').substring(0, 30);
            const folder = zip.folder(folderName);
            
            slidesData.forEach((text, i) => {
                const canvas = makeSlide(text);
                const num = String(i + 1).padStart(2, '0');
                folder.file(num + '.png', canvas.toDataURL('image/png').split(',')[1], { base64: true });
            });
            
            const blob = await zip.generateAsync({ type: 'blob' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = folderName + '_lyrics.zip';
            link.click();
            
            showStatus('Download complete!', 'success');
        }

        // Search Hymnary.org for traditional hymns
        async function searchHymnary(query) {
            const corsProxy = 'https://api.allorigins.win/raw?url=';
            const searchUrl = `https://hymnary.org/search?qu=${encodeURIComponent(query)}&target=hymns`;
            
            try {
                const response = await fetch(corsProxy + encodeURIComponent(searchUrl));
                const html = await response.text();
                
                // Parse search results
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const results = doc.querySelectorAll('.result-row, .results-row, table.results tr');
                
                if (results.length === 0) {
                    // Try alternate parsing
                    const links = doc.querySelectorAll('a[href*="/hymn/"]');
                    if (links.length === 0) {
                        searchResults.innerHTML = '<div class="no-results">No hymns found. Try a different search term.</div>';
                        return;
                    }
                    
                    let html = '';
                    const seen = new Set();
                    links.forEach((link, i) => {
                        if (i >= 10) return;
                        const href = link.getAttribute('href');
                        const title = link.textContent.trim();
                        if (title && !seen.has(href)) {
                            seen.add(href);
                            html += `
                                <div class="search-result-item" onclick="fetchHymnaryLyrics('${href}', '${title.replace(/'/g, "\\'")}')">
                                    <div class="title">🎵 ${title}</div>
                                    <div class="source">Hymnary.org</div>
                                </div>
                            `;
                        }
                    });
                    searchResults.innerHTML = html || '<div class="no-results">No hymns found.</div>';
                    return;
                }
                
                let resultsHtml = '';
                results.forEach((row, i) => {
                    if (i >= 8) return;
                    const titleEl = row.querySelector('a');
                    if (titleEl) {
                        const title = titleEl.textContent.trim();

                        resultsHtml += `

                                <div class="title">🎵 ${title}</div>
                                <div class="source">Hymnary.org - Click to load lyrics</div>

                searchResults.innerHTML = resultsHtml || '<div class="no-results">No hymns found. Try a different search term.</div>';

        // Fetch lyrics from Hymnary
        async function fetchHymnaryLyrics(href, title) {
            lyricsPreviewContainer.innerHTML = '<div class="searching"><span class="loading-spinner"></span> Loading lyrics...</div>';
            
            const corsProxy = 'https://api.allorigins.win/raw?url=';
            const fullUrl = href.startsWith('http') ? href : `https://hymnary.org${href}`;
            
            try {
                const response = await fetch(corsProxy + encodeURIComponent(fullUrl));
                const html = await response.text();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // Try to find lyrics in various possible containers
                let lyrics = '';
                const textContainers = doc.querySelectorAll('.hymn-text, .authority-text, .lyrics, pre, .text-content');
                
                textContainers.forEach(container => {
                    const text = container.textContent.trim();
                    if (text.length > lyrics.length && text.length > 50) {
                        lyrics = text;
                    }
                });
                
                // Also try to get stanzas
                const stanzas = doc.querySelectorAll('.stanza, .verse, p');
                if (stanzas.length > 0 && !lyrics) {
                    const stanzaTexts = [];
                    stanzas.forEach(s => {
                        const text = s.textContent.trim();
                        if (text.length > 20 && !text.includes('©') && !text.includes('Copyright')) {
                            stanzaTexts.push(text);
                        }
                    });
                    lyrics = stanzaTexts.join('\n\n');
                }
                
                if (lyrics) {
                    // Clean up the lyrics
                    lyrics = lyrics
                        .replace(/\t+/g, '')
                        .replace(/\n{3,}/g, '\n\n')
                        .replace(/^\d+\.\s*/gm, '\n') // Remove stanza numbers
                        .trim();
                    
                    displayLyricsPreview(title, lyrics, 'Hymnary.org');
                } else {
                    lyricsPreviewContainer.innerHTML = `
                        <div class="no-results">
                            Could not extract lyrics. 
                            <a href="${fullUrl}" target="_blank" style="color: #4285f4;">Open on Hymnary.org ↗</a>
                        </div>
                    `;
                }
                
            } catch (error) {
                console.error('Fetch lyrics error:', error);
                lyricsPreviewContainer.innerHTML = '<div class="no-results">Could not load lyrics. Please try again.</div>';
            }
        }

        window.fetchHymnaryLyrics = fetchHymnaryLyrics;
        window.fetchLyricsOvh = fetchLyricsOvh;
        window.searchHymnary = searchHymnary;
        window.useLyrics = useLyrics;
        
        const driveBtn = document.getElementById('driveBtn');
        driveBtn.addEventListener('click', uploadToDrive);
        
        async function uploadToDrive() {
            if (slidesData.length === 0) return;
            
            // Check if we have a token
            if (!accessToken) {
                // Use Google Identity Services for auth
                await authenticateGoogle();
                if (!accessToken) return;
            }
            
            driveBtn.disabled = true;
            driveBtn.textContent = '⏳ Uploading...';
            
            try {
                // Create ZIP blob
                const zip = new JSZip();
                const folderName = songTitle.replace(/[^a-z0-9]/gi, '_').substring(0, 30);
                const folder = zip.folder(folderName);
                
                slidesData.forEach((text, i) => {
                    const canvas = makeSlide(text);
                    const num = String(i + 1).padStart(2, '0');
                    folder.file(num + '.png', canvas.toDataURL('image/png').split(',')[1], { base64: true });
                });
                
                const zipBlob = await zip.generateAsync({ type: 'blob' });
                
                // Upload to Google Drive
                const metadata = {
                    name: folderName + '_lyrics.zip',
                    parents: [DRIVE_FOLDER_ID]
                };
                
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                form.append('file', zipBlob);
                
                const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + accessToken
                    },
                    body: form
                });
                
                if (response.ok) {
                    showStatus('✓ Uploaded to Google Drive!', 'success');
                } else {
                    const error = await response.json();
                    console.error('Upload error:', error);
                    if (error.error?.code === 401) {
                        accessToken = null;
                        showStatus('Session expired. Click again to re-authenticate.', 'error');
                    } else {
                        showStatus('Upload failed: ' + (error.error?.message || 'Unknown error'), 'error');
                    }
                }
            } catch (err) {
                console.error('Upload error:', err);
                showStatus('Upload failed: ' + err.message, 'error');
            }
            
            driveBtn.disabled = false;
            driveBtn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" style="vertical-align: middle; margin-right: 6px;"><path fill="currentColor" d="M7.71 3.5L1.15 15l4.58 7.5h13.54l4.58-7.5L17.29 3.5H7.71zm-.6 1.5h5.79l5.9 9.5H7.11l-5.9-9.5zm6.5 0h5.79l-5.9 9.5h-5.79l5.9-9.5zM6.41 15h10.18l-2.89 4.5H9.3L6.41 15z"/></svg> Send to Google Drive';
        }
        
        async function authenticateGoogle() {
            return new Promise((resolve) => {
                // Using Google Identity Services (GIS)
                if (typeof google === 'undefined' || !google.accounts) {
                    showStatus('Google API not loaded. Please refresh the page.', 'error');
                    resolve();
                    return;
                }
                
                const tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: GOOGLE_CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/drive.file',
                    callback: (response) => {
                        if (response.access_token) {
                            accessToken = response.access_token;
                            showStatus('Connected to Google Drive!', 'success');
                        } else {
                            showStatus('Authentication cancelled', 'error');
                        }
                        resolve();
                    },
                });
                
                tokenClient.requestAccessToken();
            });
        }
    </script>
    
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
