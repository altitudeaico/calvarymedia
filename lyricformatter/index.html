<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Lyric Formatter | Calvary Hephzibah</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --red: #C41E2A;
            --red-dark: #8B1520;
            --red-glow: rgba(196, 30, 42, 0.18);
            --black: #0C0C0C;
            --surface: #161616;
            --surface-2: #1F1F1F;
            --border: rgba(255,255,255,0.07);
            --text: #F0EDE8;
            --text-muted: rgba(240,237,232,0.45);
            --slide-bg: #111111;
            --slide-text: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Source Sans 3', sans-serif;
            background: var(--black);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Header */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header img {
            height: 40px;
            width: auto;
        }

        .header-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
        }

        .header-text p {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .badge {
            margin-left: auto;
            background: var(--red-glow);
            border: 1px solid rgba(196,30,42,0.4);
            color: #ff6b76;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 4px;
        }

        /* Main layout */
        .main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px 80px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            align-items: start;
        }

        @media (max-width: 768px) {
            .main { grid-template-columns: 1fr; padding: 20px 16px 60px; }
        }

        /* Panel */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .step-num {
            width: 24px;
            height: 24px;
            background: var(--red);
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .panel-header h2 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
        }

        .panel-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Inputs */
        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
        }

        input[type="text"], textarea {
            width: 100%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Source Sans 3', sans-serif;
            font-size: 0.95rem;
            padding: 12px 14px;
            outline: none;
            transition: border-color 0.2s;
            resize: vertical;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: rgba(196,30,42,0.6);
        }

        input[type="text"]::placeholder, textarea::placeholder {
            color: rgba(240,237,232,0.2);
        }

        textarea {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.8;
            min-height: 260px;
        }

        .hint {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.5;
            background: rgba(196,30,42,0.06);
            border: 1px solid rgba(196,30,42,0.15);
            border-radius: 6px;
            padding: 10px 12px;
        }

        .hint strong { color: rgba(240,237,232,0.75); }

        /* Generate button */
        .btn-generate {
            width: 100%;
            background: var(--red);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px 20px;
            font-family: 'Source Sans 3', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-generate:hover { background: #a01825; }
        .btn-generate:active { transform: scale(0.99); }

        /* Right panel - preview */
        .preview-panel { position: sticky; top: 24px; }

        .slide-count {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-left: auto;
            font-family: 'JetBrains Mono', monospace;
        }

        .preview-area {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 520px;
            overflow-y: auto;
        }

        .preview-area::-webkit-scrollbar { width: 4px; }
        .preview-area::-webkit-scrollbar-track { background: transparent; }
        .preview-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
        .empty-state p { font-size: 0.9rem; }

        /* Slide preview */
        .slide-preview {
            background: var(--slide-bg);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
            flex-shrink: 0;
        }

        .slide-preview .slide-num {
            position: absolute;
            top: 8px;
            left: 10px;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.2);
            font-family: 'JetBrains Mono', monospace;
        }

        .slide-preview .slide-title-label {
            position: absolute;
            top: 8px;
            right: 10px;
            font-size: 0.6rem;
            color: rgba(196,30,42,0.6);
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .slide-content {
            text-align: center;
            color: var(--slide-text);
        }

        .slide-content .line {
            font-family: 'Playfair Display', serif;
            font-size: clamp(0.75rem, 2vw, 1rem);
            font-weight: 600;
            line-height: 1.5;
            display: block;
        }

        /* Title slide styling */
        .slide-preview.is-title { background: linear-gradient(135deg, #1a0608 0%, #0c0c0c 100%); }
        .slide-preview.is-title .slide-content .line { color: #ff8a93; }

        /* Download area */
        .download-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: none;
        }

        .download-area.visible { display: block; }

        .btn-download {
            width: 100%;
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 20px;
            font-family: 'Source Sans 3', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-download:hover {
            background: var(--surface-2);
            border-color: rgba(255,255,255,0.15);
        }

        /* Slide canvas (hidden, used for image generation) */
        #slideCanvas { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://images.leadconnectorhq.com/image/f_webp/q_80/r_1200/u_https://assets.cdn.filesafe.space/ufTeOHywYxLPaG9TDWPG/media/68319627522e13a702426868.png" alt="Calvary Logo">
        <div class="header-text">
            <h1>Song Lyric Formatter</h1>
            <p>Calvary Hephzibah Media Team</p>
        </div>
        <span class="badge">Lite</span>
    </div>

    <div class="main">

        <!-- Input Panel -->
        <div class="panel">
            <div class="panel-header">
                <div class="step-num">1</div>
                <h2>Enter Lyrics</h2>
            </div>
            <div class="panel-body">
                <div>
                    <label>Song Title</label>
                    <input type="text" id="songTitle" placeholder="e.g. Days of Elijah">
                </div>
                <div>
                    <label>Lyrics</label>
                    <textarea id="lyricsInput" placeholder="He's my rock, He's my fortress
He's my deliverer, in Him will I trust

Praise the Lord, praise the Lord
Let the earth hear His voice"></textarea>
                </div>
                <div class="hint">
                    <strong>Two lines per slide.</strong> Keep each line ~25–30 characters. Add a <strong>blank line</strong> between each pair to create a new slide.
                </div>
                <button class="btn-generate" onclick="generateSlides()">
                    ✨ Generate Slides
                </button>
            </div>
        </div>

        <!-- Preview Panel -->
        <div class="panel preview-panel">
            <div class="panel-header">
                <div class="step-num">2</div>
                <h2>Preview &amp; Download</h2>
                <span class="slide-count" id="slideCount"></span>
            </div>
            <div class="preview-area" id="previewArea">
                <div class="empty-state">
                    <div class="icon">🎵</div>
                    <p>Enter lyrics and click Generate<br>to preview slides</p>
                </div>
            </div>
            <div class="download-area" id="downloadArea">
                <button class="btn-download" onclick="downloadZip()">
                    📥 Download ZIP
                </button>
            </div>
        </div>

    </div>

    <canvas id="slideCanvas" width="1920" height="1080"></canvas>

    <script>
        let generatedSlides = [];

        function parseSlides(title, lyrics) {
            const slides = [];

            // Title slide
            slides.push({ type: 'title', lines: [title] });

            // Split by blank lines
            const blocks = lyrics.trim().split(/\n\s*\n/);
            blocks.forEach(block => {
                const lines = block.trim().split('\n').map(l => l.trim()).filter(l => l.length > 0);
                if (lines.length > 0) {
                    slides.push({ type: 'lyric', lines });
                }
            });

            return slides;
        }

        function generateSlides() {
            const title = document.getElementById('songTitle').value.trim();
            const lyrics = document.getElementById('lyricsInput').value.trim();

            if (!title && !lyrics) return;

            generatedSlides = parseSlides(title || 'Untitled', lyrics);

            const previewArea = document.getElementById('previewArea');
            const slideCount = document.getElementById('slideCount');
            const downloadArea = document.getElementById('downloadArea');

            slideCount.textContent = `${generatedSlides.length} slides`;
            downloadArea.classList.add('visible');

            previewArea.innerHTML = '';

            generatedSlides.forEach((slide, i) => {
                const div = document.createElement('div');
                div.className = `slide-preview${slide.type === 'title' ? ' is-title' : ''}`;

                const numEl = document.createElement('div');
                numEl.className = 'slide-num';
                numEl.textContent = `${String(i + 1).padStart(2, '0')}`;
                div.appendChild(numEl);

                if (slide.type === 'title') {
                    const label = document.createElement('div');
                    label.className = 'slide-title-label';
                    label.textContent = 'Title';
                    div.appendChild(label);
                }

                const content = document.createElement('div');
                content.className = 'slide-content';
                slide.lines.forEach(line => {
                    const span = document.createElement('span');
                    span.className = 'line';
                    span.textContent = line;
                    content.appendChild(span);
                });
                div.appendChild(content);
                previewArea.appendChild(div);
            });
        }

        async function renderSlideToCanvas(slide, canvas) {
            const ctx = canvas.getContext('2d');
            const W = 1920, H = 1080;

            ctx.clearRect(0, 0, W, H);

            // Background
            if (slide.type === 'title') {
                const grad = ctx.createLinearGradient(0, 0, W, H);
                grad.addColorStop(0, '#1a0608');
                grad.addColorStop(1, '#0c0c0c');
                ctx.fillStyle = grad;
            } else {
                ctx.fillStyle = '#111111';
            }
            ctx.fillRect(0, 0, W, H);

            // Red accent line at bottom
            ctx.fillStyle = '#C41E2A';
            ctx.fillRect(0, H - 6, W, 6);

            // Text
            const lines = slide.lines;
            const fontSize = slide.type === 'title' ? 80 : 72;
            ctx.font = `700 ${fontSize}px 'Georgia', serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = slide.type === 'title' ? '#ff8a93' : '#FFFFFF';

            const lineHeight = fontSize * 1.5;
            const totalH = lines.length * lineHeight;
            const startY = (H - totalH) / 2 + lineHeight / 2;

            lines.forEach((line, i) => {
                ctx.fillText(line, W / 2, startY + i * lineHeight);
            });

            return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        }

        async function downloadZip() {
            if (generatedSlides.length === 0) return;

            const btn = document.querySelector('.btn-download');
            btn.textContent = '⏳ Generating...';
            btn.disabled = true;

            const zip = new JSZip();
            const canvas = document.getElementById('slideCanvas');
            const title = document.getElementById('songTitle').value.trim() || 'slides';
            const folder = zip.folder(title.replace(/[^a-z0-9]/gi, '_'));

            for (let i = 0; i < generatedSlides.length; i++) {
                const blob = await renderSlideToCanvas(generatedSlides[i], canvas);
                const filename = `slide_${String(i + 1).padStart(2, '0')}.png`;
                folder.file(filename, blob);
            }

            const zipBlob = await zip.generateAsync({ type: 'blob' });
            const url = URL.createObjectURL(zipBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${title.replace(/[^a-z0-9]/gi, '_')}_slides.zip`;
            a.click();
            URL.revokeObjectURL(url);

            btn.textContent = '📥 Download ZIP';
            btn.disabled = false;
        }

        // Allow Enter key to trigger generate (Shift+Enter for newline in textarea)
        document.getElementById('songTitle').addEventListener('keydown', e => {
            if (e.key === 'Enter') generateSlides();
        });
    </script>

</body>
</html>
